<svg xmlns="http://www.w3.org/2000/svg" width="256" height="332" viewBox="0 0 100 130">
  <defs>
    <!-- white glow (same as your hourglass) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b1"/>
      <feGaussianBlur stdDeviation="3.6" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- W (wider, closer to the icon) -->
  <g filter="url(#glow)" fill="none" stroke="#fff"
     stroke-linecap="butt" stroke-linejoin="butt" stroke-width="7">
    <!-- main W -->
    <path d="M8 18 L32 112 L50 18 L68 112 L92 18" />
    <!-- cross bar (longer like the icon) -->
    <path d="M2 58 H98" />
  </g>
</svg>
