<svg xmlns="http://www.w3.org/2000/svg" width="256" height="332" viewBox="0 0 100 130">
  <defs>
    <!-- white glow (same as your previous SVGs) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="b1"/>
      <feGaussianBlur stdDeviation="3.6" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- icon -->
  <g filter="url(#glow)" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- outer ring -->
    <circle cx="50" cy="66" r="40" fill="none" stroke-width="8"/>

    <!-- lightning bolt -->
    <path
      d="
        M60 16
        L34 78
        H52
        L42 118
        L76 56
        H56
        Z
      "
      fill="#fff"
      stroke-width="3"
    />
  </g>
</svg>
