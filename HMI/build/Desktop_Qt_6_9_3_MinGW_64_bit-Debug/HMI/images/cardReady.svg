<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <defs>
    <filter id="neon" x="-40%" y="-60%" width="180%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"   result="blur2"/>

      <feFlood flood-color="#FFFFFF" flood-opacity="0.95" result="w1"/>
      <feComposite in="w1" in2="blur2" operator="in" result="glowStrong"/>

      <feFlood flood-color="#FFFFFF" flood-opacity="0.55" result="w2"/>
      <feComposite in="w2" in2="blur1" operator="in" result="glowSoft"/>

      <feMerge>
        <feMergeNode in="glowStrong"/>
        <feMergeNode in="glowSoft"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== Glow layer (thick) ===== -->
  <g filter="url(#neon)" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
    <!-- Card -->
    <rect x="70" y="120" width="240" height="130" rx="18" ry="18" stroke-width="18"/>
    <!-- Card bottom stripe -->
    <line x1="88" y1="208" x2="292" y2="208" stroke-width="18"/>

    <!-- Check (moved left a bit to avoid clipping) -->
    <circle cx="392" cy="115" r="72" stroke-width="18"/>
    <path d="M362 120 L384 142 L432 86" stroke-width="18"/>
  </g>

  <!-- ===== Core layer (thin) ===== -->
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <rect x="70" y="120" width="240" height="130" rx="18" ry="18" stroke-width="6"/>
    <line x1="88" y1="208" x2="292" y2="208" stroke-width="6"/>

    <circle cx="392" cy="115" r="72" stroke-width="6"/>
    <path d="M362 120 L384 142 L432 86" stroke-width="6"/>
  </g>
</svg>
