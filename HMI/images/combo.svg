<svg xmlns="http://www.w3.org/2000/svg" width="196" height="180" viewBox="0 0 196 180">
  <defs>
    <!-- 살짝 빛나는 느낌 -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#9FFFE3" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5"   flood-color="#9FFFE3" flood-opacity="0.25"/>
    </filter>

    <style>
      .ol  { fill: none; stroke: #F2FFF9; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; }
      .in  { fill: none; stroke: #F2FFF9; stroke-width: 6;  stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: none; stroke: #F2FFF9; stroke-width: 6;  stroke-linecap: round; stroke-linejoin: round; }

      .k  { fill:#F2FFF9; font-family: "Noto Sans KR","Malgun Gothic","Apple SD Gothic Neo",sans-serif; font-weight: 900; }
      .e  { fill:#F2FFF9; font-family: "Montserrat","Arial Black","Arial",sans-serif; font-weight: 900; letter-spacing: 1.2px; }
    </style>
  </defs>

  <!-- ===== ICON (LEFT) ===== -->
  <g filter="url(#glow)">
    <!-- head (outer + inner ring) -->
    <circle class="ol" cx="58" cy="66" r="44"/>
    <circle class="in" cx="58" cy="66" r="33"/>

    <!-- top cap (원본처럼 위로 살짝 튀는 형태) -->
    <path class="ol" d="
      M 44 20
      Q 44 12 52 12
      L 64 12
      Q 72 12 72 20
      L 72 26
      L 44 26
      Z" />
    <!-- cap 내부 작은 홈 -->
    <path class="in" d="M 50 20 L 66 20" />

    <!-- face dots: 위 2개(큰), 중간 2개(작), 아래 1개(큰) -->
    <circle class="dot" cx="46" cy="54" r="6.5"/>
    <circle class="dot" cx="70" cy="54" r="6.5"/>

    <circle class="dot" cx="44.5" cy="74" r="5.2"/>
    <circle class="dot" cx="71.5" cy="74" r="5.2"/>

    <circle class="dot" cx="58" cy="86.5" r="6.8"/>

    <!-- neck (원본처럼 아래쪽이 살짝 파인 연결부) -->
    <path class="ol" d="
      M 48 106
      Q 58 116 68 106" />

    <!-- base (캡슐형 + 가운데 파인 노치) -->
    <path class="ol" d="
      M 22 126
      Q 22 112 36 112
      L 80 112
      Q 94 112 94 126
      L 94 146
      Q 94 160 80 160
      L 36 160
      Q 22 160 22 146
      Z" />

    <!-- 가운데 노치(원본처럼 위로 파인 부분) -->
    <path class="in" d="
      M 54 112
      Q 58 118 62 112" />

    <!-- base 내부 원 2개 + 안쪽 작은 점 -->
    <circle class="in" cx="40" cy="136" r="12"/>
    <circle class="in" cx="76" cy="136" r="12"/>
    <circle class="in" cx="40" cy="136" r="3.2"/>
    <circle class="in" cx="76" cy="136" r="3.2"/>

    <!-- base 중앙 세로 홈(배경 투과 느낌) -->
    <path class="in" d="
      M 56 124
      Q 58 122 60 124
      L 60 148
      Q 58 150 56 148
      Z" />
  </g>

  <!-- ===== TEXT (RIGHT) ===== -->
  <g filter="url(#glow)">
    <text x="112" y="78" font-size="40" class="k">콤보</text>
    <text x="112" y="112" font-size="22" class="e">COMBO</text>
  </g>
</svg>
